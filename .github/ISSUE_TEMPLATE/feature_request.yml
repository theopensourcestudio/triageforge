name: Feature request
description: Propose a maintainer workflow or report improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Maintainer problem
      description: What repetitive or risky work needs improving?
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Current workflow
      description: Explain how maintainers handle this today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and false-positive considerations
