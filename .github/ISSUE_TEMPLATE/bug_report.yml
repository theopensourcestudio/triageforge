name: Bug report
description: Report reproducible incorrect behaviour.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve TriageForge. Please remove secrets before posting logs."
  - type: input
    id: version
    attributes:
      label: TriageForge version or commit
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include commands, sample input, and the smallest repository layout that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, git version"
    validations:
      required: true
